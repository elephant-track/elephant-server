name: Release to PyPI
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency: publish-${{ github.ref }}
jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv (and cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build & publish core (PyPI)
        run: |
          uv build libs/elephant_core --no-sources
          uv publish libs/elephant_core --no-sources

      - name: Build & publish app (PyPI)
        run: |
          uv build apps/elephant_server --no-sources
          uv publish apps/elephant_server --no-sources
